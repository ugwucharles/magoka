<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Popups - EatYum Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">Popup Management</h1>
        
        <!-- Add New Popup Form -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4">Create New Popup</h2>
            <form id="popupForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                        <input type="text" id="title" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                        <input type="text" id="imageUrl" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">CTA Label</label>
                        <input type="text" id="ctaLabel" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">CTA Link</label>
                        <input type="text" id="ctaLink" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Outlet ID (leave empty for all)</label>
                        <input type="text" id="outletId" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Auto-dismiss (seconds)</label>
                        <input type="number" id="dismissAfterSeconds" value="10" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500">
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <label class="flex items-center">
                        <input type="checkbox" id="isActive" checked class="mr-2">
                        <span class="text-sm font-medium text-gray-700">Active</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="autoDismiss" checked class="mr-2">
                        <span class="text-sm font-medium text-gray-700">Auto-dismiss</span>
                    </label>
                </div>
                <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-md hover:bg-red-700 transition-colors">
                    Create Popup
                </button>
            </form>
        </div>

        <!-- Popups List -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">Existing Popups</h2>
            <div id="popupsList" class="space-y-4">
                <p class="text-gray-500">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/admin/popups';
        let authToken = localStorage.getItem('adminToken') || localStorage.getItem('token');

        if (!authToken) {
            alert('Please log in to the admin panel first');
            window.location.href = '/control/login';
        }

        async function fetchPopups() {
            try {
                const response = await fetch(API_BASE, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                const popups = await response.json();
                renderPopups(popups);
            } catch (error) {
                console.error('Error fetching popups:', error);
                document.getElementById('popupsList').innerHTML = '<p class="text-red-500">Error loading popups</p>';
            }
        }

        function renderPopups(popups) {
            const container = document.getElementById('popupsList');
            if (popups.length === 0) {
                container.innerHTML = '<p class="text-gray-500">No popups found</p>';
                return;
            }

            container.innerHTML = popups.map(popup => `
                <div class="border border-gray-200 rounded-lg p-4 ${!popup.isActive ? 'opacity-50' : ''}">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-semibold text-gray-800">${popup.title}</h3>
                            <p class="text-sm text-gray-600 mt-1">${popup.description || 'No description'}</p>
                            <div class="mt-2 text-xs text-gray-500">
                                <span>Outlet: ${popup.outletId || 'all'}</span> | 
                                <span>Active: ${popup.isActive ? 'Yes' : 'No'}</span> |
                                <span>Auto-dismiss: ${popup.displayConfig?.autoDismiss ? popup.displayConfig.dismissAfterSeconds + 's' : 'No'}</span>
                            </div>
                            ${popup.imageUrl ? `<img src="${popup.imageUrl}" alt="${popup.title}" class="mt-2 h-20 w-auto object-cover rounded">` : ''}
                        </div>
                        <div class="flex gap-2 ml-4">
                            <button onclick="deletePopup('${popup.id}')" class="text-red-600 hover:text-red-800 text-sm">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function createPopup(e) {
            e.preventDefault();
            
            const popupData = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                imageUrl: document.getElementById('imageUrl').value,
                ctaLabel: document.getElementById('ctaLabel').value,
                ctaLink: document.getElementById('ctaLink').value,
                outletId: document.getElementById('outletId').value || 'all',
                isActive: document.getElementById('isActive').checked,
                displayConfig: {
                    position: 'center',
                    autoDismiss: document.getElementById('autoDismiss').checked,
                    dismissAfterSeconds: parseInt(document.getElementById('dismissAfterSeconds').value) || 10,
                    displayStyle: 'slide-in'
                }
            };

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(popupData)
                });

                if (response.ok) {
                    document.getElementById('popupForm').reset();
                    fetchPopups();
                    alert('Popup created successfully!');
                } else {
                    alert('Error creating popup');
                }
            } catch (error) {
                console.error('Error creating popup:', error);
                alert('Error creating popup');
            }
        }

        async function deletePopup(id) {
            if (!confirm('Are you sure you want to delete this popup?')) return;

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    fetchPopups();
                    alert('Popup deleted successfully!');
               } else {
                    alert('Error deleting popup');
                }
            } catch (error) {
                console.error('Error deleting popup:', error);
                alert('Error deleting popup');
            }
        }

        document.getElementById('popupForm').addEventListener('submit', createPopup);
        fetchPopups();
    </script>
</body>
</html>
